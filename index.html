<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Earth Map - Interactive 3D Globe Explorer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: #000814;
        }

        #canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .ui-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            z-index: 10;
        }

        .header {
            position: fixed;
            top: 30px;
            left: 30px;
            pointer-events: auto;
            z-index: 10;
        }

        .header h1 {
            font-size: 32px;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin: 0;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
            color: #ffffff;
        }

        .header p {
            font-size: 14px;
            color: #94a3b8;
            margin: 8px 0 0 0;
            font-weight: 400;
        }

        .panel {
            position: fixed;
            background-color: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(148, 163, 184, 0.2);
            border-radius: 12px;
            padding: 20px;
            color: #ffffff;
            pointer-events: auto;
            z-index: 10;
            font-size: 13px;
            animation: fadeIn 0.6s ease-out;
        }

        .panel h3 {
            margin: 0 0 12px 0;
            font-size: 14px;
            font-weight: 600;
            color: #e2e8f0;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .panel ul {
            margin: 0;
            padding: 0 0 0 20px;
            color: #cbd5e1;
            line-height: 1.8;
        }

        .panel li {
            list-style: none;
            margin-bottom: 6px;
        }

        .control-panel {
            bottom: 30px;
            left: 30px;
            max-width: 300px;
            animation-delay: 0.2s;
        }

        .stats-panel {
            bottom: 30px;
            right: 30px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            animation-delay: 0.3s;
        }

        .stats-panel > div {
            margin-bottom: 8px;
            color: #94a3b8;
        }

        .stat-value {
            color: #60a5fa;
            font-weight: 600;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, #000814, #1a3a52);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            flex-direction: column;
            gap: 20px;
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(96, 165, 250, 0.2);
            border-top: 3px solid #60a5fa;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error-screen {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(15, 23, 42, 0.95);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 12px;
            padding: 40px;
            color: #ffffff;
            text-align: center;
            z-index: 100;
            max-width: 500px;
        }

        .error-screen h2 {
            color: #ef4444;
            margin-bottom: 15px;
        }

        @media (max-width: 768px) {
            .header h1 { font-size: 24px; }
            .header p { font-size: 12px; }
            .panel { padding: 16px; font-size: 12px; }
            .control-panel { left: 15px; }
            .stats-panel { right: 15px; }
        }
    </style>
</head>
<body>
    <div id="loading" class="loading-screen">
        <div class="loading-spinner"></div>
        <p style="color: #94a3b8;">Loading Earth Map...</p>
    </div>

    <div id="error" class="error-screen" style="display: none;">
        <h2>❌ Error Loading</h2>
        <p id="error-message"></p>
    </div>

    <!-- Canvas for Three.js -->
    <canvas id="canvas"></canvas>

    <!-- UI Overlay -->
    <div class="ui-overlay">
        <div class="header">
            <h1>🌍 Earth Map</h1>
            <p>Interactive 3D Globe Explorer</p>
        </div>

        <div class="panel control-panel">
            <h3>Controls</h3>
            <ul>
                <li>🖱️ Drag to rotate</li>
                <li>🔍 Scroll to zoom</li>
                <li>📱 Touch to explore</li>
                <li>🌐 Double-tap zoom</li>
            </ul>
        </div>

        <div class="panel stats-panel">
            <div>Zoom: <span class="stat-value" id="zoom-level">1.00x</span></div>
            <div>Status: <span class="stat-value" id="status">Ready</span></div>
            <div style="margin-top: 8px; font-size: 11px; color: #475569;">Three.js WebGL</div>
        </div>
    </div>

    <!-- Three.js -->
    <script src="https://cdn.jsdelivr.net/npm/three@r128/build/three.min.js"></script>

    <script>
        let zoom = 1;
        let isDragging = false;
        let previousMousePosition = { x: 0, y: 0 };
        let rotation = { x: 0, y: 0 };

        try {
            // Get canvas and setup renderer
            const canvas = document.getElementById('canvas');
            const loadingScreen = document.getElementById('loading');
            const errorScreen = document.getElementById('error');
            const errorMessage = document.getElementById('error-message');
            const zoomLevel = document.getElementById('zoom-level');
            const status = document.getElementById('status');

            if (!canvas) throw new Error('Canvas element not found');
            if (!THREE) throw new Error('Three.js failed to load');

            // Setup scene
            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0x000814);

            // Setup camera
            const camera = new THREE.PerspectiveCamera(
                75,
                window.innerWidth / window.innerHeight,
                0.1,
                10000
            );
            camera.position.z = 2.5;

            // Setup renderer
            const renderer = new THREE.WebGLRenderer({ 
                canvas: canvas,
                antialias: true,
                alpha: true,
                precision: 'highp',
                powerPreference: 'high-performance'
            });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.shadowMap.enabled = true;

            // Create Earth
            const geometry = new THREE.SphereGeometry(1, 128, 128);

            // Create texture
            const canvas2d = document.createElement('canvas');
            canvas2d.width = 4096;
            canvas2d.height = 2048;
            const ctx = canvas2d.getContext('2d');

            // Draw ocean
            ctx.fillStyle = '#0d47a1';
            ctx.fillRect(0, 0, canvas2d.width, canvas2d.height);

            // Draw continents
            ctx.fillStyle = '#2e7d32';
            const continents = [
                { x: 200, y: 300, w: 500, h: 400 },   // North America
                { x: 400, y: 700, w: 300, h: 400 },   // South America
                { x: 1100, y: 200, w: 600, h: 800 },  // Europe & Africa
                { x: 1800, y: 250, w: 1000, h: 500 }, // Asia
                { x: 2200, y: 1200, w: 300, h: 250 }, // Australia
                { x: 0, y: 1800, w: canvas2d.width, h: 248 } // Antarctica
            ];
            continents.forEach(cont => ctx.fillRect(cont.x, cont.y, cont.w, cont.h));

            // Draw grid
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.1)';
            ctx.lineWidth = 1;
            for (let i = 0; i <= 18; i++) {
                const y = i * canvas2d.height / 18;
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(canvas2d.width, y);
                ctx.stroke();
            }
            for (let i = 0; i <= 36; i++) {
                const x = i * canvas2d.width / 36;
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, canvas2d.height);
                ctx.stroke();
            }

            // Draw clouds
            ctx.fillStyle = 'rgba(255, 255, 255, 0.15)';
            for (let i = 0; i < 30; i++) {
                const x = Math.random() * canvas2d.width;
                const y = Math.random() * canvas2d.height;
                const size = Math.random() * 100 + 50;
                ctx.beginPath();
                ctx.arc(x, y, size, 0, Math.PI * 2);
                ctx.fill();
            }

            const texture = new THREE.CanvasTexture(canvas2d);
            texture.anisotropy = renderer.capabilities.maxAnisotropy;

            const material = new THREE.MeshStandardMaterial({
                map: texture,
                roughness: 0.8,
                metalness: 0.1,
                emissive: 0x1a3a52,
                emissiveIntensity: 0.2
            });

            const globe = new THREE.Mesh(geometry, material);
            globe.castShadow = true;
            globe.receiveShadow = true;
            scene.add(globe);

            // Atmosphere
            const atmosphereGeometry = new THREE.SphereGeometry(1.05, 64, 64);
            const atmosphereMaterial = new THREE.MeshPhongMaterial({
                color: 0x4da6ff,
                emissive: 0x003d82,
                emissiveIntensity: 0.2,
                transparent: true,
                opacity: 0.1,
                side: THREE.BackSide
            });
            const atmosphere = new THREE.Mesh(atmosphereGeometry, atmosphereMaterial);
            scene.add(atmosphere);

            // Stars
            const starsGeometry = new THREE.BufferGeometry();
            const starsPositions = new Float32Array();
            for (let i = 0; i < 2000; i++) {
                starsPositions.push(
                    (Math.random() - 0.5) * 200,
                    (Math.random() - 0.5) * 200,
                    (Math.random() - 0.5) * 200
                );
            }
            starsGeometry.setAttribute('position', new THREE.BufferAttribute(starsPositions, 3));
            const stars = new THREE.Points(
                starsGeometry,
                new THREE.PointsMaterial({ color: 0xffffff, size: 0.08, sizeAttenuation: true })
            );
            scene.add(stars);

            // Lighting
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
            scene.add(ambientLight);

            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
            directionalLight.position.set(5, 3, 5);
            directionalLight.castShadow = true;
            scene.add(directionalLight);

            const pointLight = new THREE.PointLight(0x4da6ff, 0.3);
            pointLight.position.set(-5, -3, -5);
            scene.add(pointLight);

            // Event listeners
            canvas.addEventListener('mousedown', (e) => {
                isDragging = true;
                previousMousePosition = { x: e.clientX, y: e.clientY };
            });

            canvas.addEventListener('mousemove', (e) => {
                if (!isDragging) return;
                
                const deltaX = e.clientX - previousMousePosition.x;
                const deltaY = e.clientY - previousMousePosition.y;

                rotation.y += deltaX * 0.005;
                rotation.x += deltaY * 0.005;
                rotation.x = Math.max(-Math.PI / 2, Math.min(Math.PI / 2, rotation.x));

                globe.rotation.y = rotation.y;
                globe.rotation.x = rotation.x;
                atmosphere.rotation.copy(globe.rotation);

                previousMousePosition = { x: e.clientX, y: e.clientY };
            });

            canvas.addEventListener('mouseup', () => {
                isDragging = false;
            });

            canvas.addEventListener('wheel', (e) => {
                e.preventDefault();
                zoom += e.deltaY > 0 ? 0.1 : -0.1;
                zoom = Math.max(0.5, Math.min(3, zoom));
                zoomLevel.textContent = zoom.toFixed(2) + 'x';
            });

            // Touch support
            let touchStartDistance = 0;

            canvas.addEventListener('touchstart', (e) => {
                if (e.touches.length === 2) {
                    const dx = e.touches[0].clientX - e.touches[1].clientX;
                    const dy = e.touches[0].clientY - e.touches[1].clientY;
                    touchStartDistance = Math.sqrt(dx * dx + dy * dy);
                } else if (e.touches.length === 1) {
                    isDragging = true;
                    previousMousePosition = { x: e.touches[0].clientX, y: e.touches[0].clientY };
                }
            });

            canvas.addEventListener('touchmove', (e) => {
                if (e.touches.length === 2) {
                    const dx = e.touches[0].clientX - e.touches[1].clientX;
                    const dy = e.touches[0].clientY - e.touches[1].clientY;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    const delta = distance - touchStartDistance;
                    zoom += delta > 0 ? -0.1 : 0.1;
                    zoom = Math.max(0.5, Math.min(3, zoom));
                    zoomLevel.textContent = zoom.toFixed(2) + 'x';
                    touchStartDistance = distance;
                } else if (e.touches.length === 1 && isDragging) {
                    const deltaX = e.touches[0].clientX - previousMousePosition.x;
                    const deltaY = e.touches[0].clientY - previousMousePosition.y;

                    rotation.y += deltaX * 0.005;
                    rotation.x += deltaY * 0.005;
                    rotation.x = Math.max(-Math.PI / 2, Math.min(Math.PI / 2, rotation.x));

                    globe.rotation.y = rotation.y;
                    globe.rotation.x = rotation.x;
                    atmosphere.rotation.copy(globe.rotation);

                    previousMousePosition = { x: e.touches[0].clientX, y: e.touches[0].clientY };
                }
            });

            canvas.addEventListener('touchend', () => {
                isDragging = false;
            });

            // Window resize
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });

            // Animation loop
            function animate() {
                requestAnimationFrame(animate);

                if (!isDragging) {
                    rotation.y += 0.0001;
                    globe.rotation.y = rotation.y;
                    atmosphere.rotation.y = rotation.y;
                }

                camera.position.z = 2.5 / zoom;

                renderer.render(scene, camera);
            }

            // Hide loading screen
            setTimeout(() => {
                loadingScreen.style.display = 'none';
                status.textContent = 'Running';
                status.style.color = '#10b981';
            }, 500);

            // Start animation
            animate();

        } catch (error) {
            console.error('Error:', error);
            const errorScreen = document.getElementById('error');
            const errorMessage = document.getElementById('error-message');
            const loadingScreen = document.getElementById('loading');
            
            loadingScreen.style.display = 'none';
            errorScreen.style.display = 'block';
            errorMessage.textContent = error.message;
        }
    </script>
</body>
</html>
