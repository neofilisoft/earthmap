<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Earth Map - Google Earth Style 3D Globe</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: #000;
        }

        #renderCanvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            z-index: 10;
        }

        .header {
            position: fixed;
            top: 20px;
            left: 20px;
            pointer-events: auto;
            z-index: 20;
            animation: slideDown 0.5s ease-out;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 700;
            margin: 0;
            color: #ffffff;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.6);
            letter-spacing: -0.5px;
        }

        .header p {
            font-size: 12px;
            color: #b0b0b0;
            margin: 4px 0 0 0;
            font-weight: 400;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .panel {
            position: fixed;
            background: linear-gradient(135deg, rgba(31, 41, 55, 0.95), rgba(15, 23, 42, 0.95));
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 16px;
            color: #ffffff;
            pointer-events: auto;
            z-index: 20;
            font-size: 12px;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .panel h3 {
            margin: 0 0 10px 0;
            font-size: 11px;
            font-weight: 600;
            color: #e2e8f0;
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }

        .panel-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            padding: 4px 0;
        }

        .panel-label {
            color: #94a3b8;
        }

        .panel-value {
            color: #60a5fa;
            font-weight: 600;
            font-family: 'Courier New', monospace;
        }

        .controls-panel {
            top: 20px;
            right: 20px;
            max-width: 220px;
            animation-delay: 0.1s;
        }

        .info-panel {
            bottom: 20px;
            left: 20px;
            max-width: 250px;
            animation-delay: 0.2s;
        }

        .info-panel ul {
            list-style: none;
            padding: 0;
            margin: 8px 0 0 0;
        }

        .info-panel li {
            padding: 4px 0;
            color: #cbd5e1;
            font-size: 11px;
            line-height: 1.6;
        }

        .info-panel li:before {
            content: "▸ ";
            color: #60a5fa;
            margin-right: 6px;
        }

        .search-box {
            position: fixed;
            bottom: 20px;
            right: 20px;
            max-width: 300px;
            animation: slideIn 0.5s ease-out;
            animation-delay: 0.3s;
        }

        .search-input {
            width: 100%;
            padding: 10px 12px;
            background: rgba(31, 41, 55, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 6px;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            font-size: 12px;
            outline: none;
            transition: all 0.3s ease;
        }

        .search-input:focus {
            background: rgba(31, 41, 55, 0.95);
            border-color: rgba(96, 165, 250, 0.5);
            box-shadow: 0 0 10px rgba(96, 165, 250, 0.2);
        }

        .search-input::placeholder {
            color: #64748b;
        }

        .loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 100;
            pointer-events: none;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(96, 165, 250, 0.2);
            border-top-color: #60a5fa;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading p {
            color: #94a3b8;
            font-size: 14px;
            font-weight: 500;
        }

        @media (max-width: 768px) {
            .header h1 { font-size: 22px; }
            .header p { font-size: 11px; }
            .panel { padding: 12px; font-size: 11px; }
            .controls-panel { top: 15px; right: 15px; }
            .info-panel { bottom: 15px; left: 15px; }
            .search-box { bottom: 15px; right: 15px; }
        }

        @media (max-width: 480px) {
            .header h1 { font-size: 18px; }
            .panel { padding: 10px; font-size: 10px; }
            .controls-panel { display: none; }
            .search-box { bottom: 10px; right: 10px; max-width: 200px; }
        }
    </style>
</head>
<body>
    <canvas id="renderCanvas"></canvas>

    <div class="overlay">
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Loading Earth Map...</p>
        </div>

        <div class="header">
            <h1>🌍 Earth Map</h1>
            <p>Google Earth Style Explorer</p>
        </div>

        <div class="panel controls-panel">
            <h3>Camera Controls</h3>
            <div class="panel-item">
                <span class="panel-label">Zoom:</span>
                <span class="panel-value" id="zoomValue">100%</span>
            </div>
            <div class="panel-item">
                <span class="panel-label">Altitude:</span>
                <span class="panel-value" id="altitudeValue">1000km</span>
            </div>
            <div class="panel-item">
                <span class="panel-label">Latitude:</span>
                <span class="panel-value" id="latValue">0°</span>
            </div>
            <div class="panel-item">
                <span class="panel-label">Longitude:</span>
                <span class="panel-value" id="lonValue">0°</span>
            </div>
        </div>

        <div class="panel info-panel">
            <h3>Instructions</h3>
            <ul>
                <li>Left Click + Drag to rotate</li>
                <li>Right Click + Drag to pan</li>
                <li>Scroll Wheel to zoom</li>
                <li>Double Click to focus</li>
            </ul>
        </div>

        <div class="search-box">
            <input 
                type="text" 
                class="search-input" 
                placeholder="Search location (e.g., Paris, Tokyo)..." 
                id="searchInput"
            >
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/babylonjs@6.0.0/babylon.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/babylonjs@6.0.0/babylon.loaderPlugin.js"></script>

    <script>
        // Initialize Babylon.js
        const canvas = document.getElementById('renderCanvas');
        const engine = new BABYLON.Engine(canvas, true);
        const loading = document.getElementById('loading');

        // Locations database
        const locations = {
            'paris': { lat: 48.8566, lon: 2.3522, name: 'Paris, France' },
            'tokyo': { lat: 35.6762, lon: 139.6503, name: 'Tokyo, Japan' },
            'new york': { lat: 40.7128, lon: -74.0060, name: 'New York, USA' },
            'london': { lat: 51.5074, lon: -0.1278, name: 'London, UK' },
            'sydney': { lat: -33.8688, lon: 151.2093, name: 'Sydney, Australia' },
            'dubai': { lat: 25.2048, lon: 55.2708, name: 'Dubai, UAE' },
            'singapore': { lat: 1.3521, lon: 103.8198, name: 'Singapore' },
            'bangkok': { lat: 13.7563, lon: 100.5018, name: 'Bangkok, Thailand' },
            'eiffel tower': { lat: 48.8584, lon: 2.2945, name: 'Eiffel Tower, Paris' },
            'statue of liberty': { lat: 40.6892, lon: -74.0445, name: 'Statue of Liberty, NYC' },
        };

        function createScene() {
            const scene = new BABYLON.Scene(engine);
            scene.clearColor = new BABYLON.Color3(0, 0, 0);
            scene.collisionsEnabled = true;

            // Camera - Arc Rotate Camera เหมือน Google Earth
            const camera = new BABYLON.ArcRotateCamera(
                "Camera",
                Math.PI / 2,
                Math.PI / 3,
                10,
                new BABYLON.Vector3(0, 0, 0),
                scene
            );
            camera.attachControl(canvas, true);

            // Camera controls
            camera.wheelPrecision = 50;
            camera.inertia = 0.7;
            camera.angularSensibilityX = 1000;
            camera.angularSensibilityY = 1000;
            camera.panningInertia = 0.9;

            // Limits
            camera.lowerRadiusLimit = 1.2;
            camera.upperRadiusLimit = 50;

            // Lights
            const light1 = new BABYLON.HemisphericLight("light1", new BABYLON.Vector3(0, 1, 0), scene);
            light1.intensity = 1;

            const light2 = new BABYLON.PointLight("light2", new BABYLON.Vector3(10, 20, 10), scene);
            light2.intensity = 0.5;

            // Create Earth sphere
            const earth = BABYLON.MeshBuilder.CreateSphere("earth", { diameter: 2, segments: 256 }, scene);

            // Create Earth material
            const earthMaterial = new BABYLON.StandardMaterial("earthMaterial", scene);
            
            // Create dynamic texture for Earth with satellite-like appearance
            const earthTexture = new BABYLON.DynamicTexture("earthTexture", 2048, scene);
            const ctx = earthTexture.getContext();

            // Fill with ocean color
            ctx.fillStyle = '#1a5490';
            ctx.fillRect(0, 0, 2048, 2048);

            // Add continents
            ctx.fillStyle = '#2a8c3c';

            // Simplified continent shapes
            const continents = [
                // North America
                { x: 200, y: 400, w: 600, h: 500 },
                // South America
                { x: 400, y: 1000, w: 400, h: 500 },
                // Europe & Africa
                { x: 1100, y: 300, w: 900, h: 1200 },
                // Asia
                { x: 1800, y: 400, w: 1200, h: 700 },
                // Australia
                { x: 1900, y: 1500, w: 400, h: 350 },
                // Antarctica
                { x: 0, y: 1750, w: 2048, h: 298 }
            ];

            continents.forEach(cont => {
                ctx.fillRect(cont.x, cont.y, cont.w, cont.h);
            });

            // Add some details
            ctx.fillStyle = 'rgba(255, 255, 255, 0.2)';
            for (let i = 0; i < 50; i++) {
                const x = Math.random() * 2048;
                const y = Math.random() * 2048;
                const size = Math.random() * 50 + 20;
                ctx.fillRect(x, y, size, size);
            }

            // Grid lines
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.1)';
            ctx.lineWidth = 1;
            for (let i = 0; i <= 36; i++) {
                const x = i * 2048 / 36;
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, 2048);
                ctx.stroke();
            }
            for (let i = 0; i <= 18; i++) {
                const y = i * 2048 / 18;
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(2048, y);
                ctx.stroke();
            }

            earthTexture.update();

            earthMaterial.emissiveTexture = earthTexture;
            earthMaterial.specularColor = new BABYLON.Color3(0.2, 0.2, 0.2);
            earth.material = earthMaterial;

            // Atmosphere glow
            const glowLayer = new BABYLON.GlowLayer("glow", scene);
            glowLayer.addIncludedOnlyMesh(earth);
            glowLayer.intensity = 0.5;

            // Stars background
            const starfield = BABYLON.MeshBuilder.CreateSphere("starfield", { diameter: 200, segments: 64 }, scene);
            const starMaterial = new BABYLON.StandardMaterial("starMaterial", scene);
            const starTexture = new BABYLON.DynamicTexture("starTexture", 1024, scene);
            const starCtx = starTexture.getContext();
            
            starCtx.fillStyle = '#000000';
            starCtx.fillRect(0, 0, 1024, 1024);
            starCtx.fillStyle = '#ffffff';
            for (let i = 0; i < 500; i++) {
                const x = Math.random() * 1024;
                const y = Math.random() * 1024;
                const size = Math.random() * 2;
                starCtx.fillRect(x, y, size, size);
            }
            starTexture.update();

            starMaterial.emissiveTexture = starTexture;
            starfield.material = starMaterial;

            return { scene, camera, earth };
        }

        async function main() {
            const { scene, camera, earth } = createScene();

            // Variables for tracking
            let currentZoom = 100;
            let currentAltitude = 1000;

            // Update position display
            function updateDisplay() {
                const sphericalCoordinates = BABYLON.Vector3.Zero().subtract(camera.target).normalize();
                const lat = Math.asin(sphericalCoordinates.y) * 180 / Math.PI;
                const lon = Math.atan2(sphericalCoordinates.x, sphericalCoordinates.z) * 180 / Math.PI;

                currentZoom = Math.round(100 / camera.radius);
                currentAltitude = Math.round((camera.radius - 1) * 1000);

                document.getElementById('zoomValue').textContent = currentZoom + '%';
                document.getElementById('altitudeValue').textContent = currentAltitude + 'km';
                document.getElementById('latValue').textContent = lat.toFixed(2) + '°';
                document.getElementById('lonValue').textContent = lon.toFixed(2) + '°';
            }

            // Fly to location
            function flyToLocation(lat, lon, zoom = 0.3) {
                const radLat = lat * Math.PI / 180;
                const radLon = lon * Math.PI / 180;

                const target = new BABYLON.Vector3(
                    Math.cos(radLat) * Math.sin(radLon),
                    Math.sin(radLat),
                    Math.cos(radLat) * Math.cos(radLon)
                );

                camera.target = target;
                camera.radius = zoom;

                // Smooth animation
                BABYLON.Animation.CreateAndStartAnimation(
                    "FlyTo",
                    camera,
                    "radius",
                    60,
                    30,
                    camera.radius,
                    zoom,
                    BABYLON.Animation.ANIMATIONLOOPMODE_CONSTANT
                );
            }

            // Search functionality
            document.getElementById('searchInput').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    const query = e.target.value.toLowerCase();
                    const location = locations[query];
                    
                    if (location) {
                        flyToLocation(location.lat, location.lon, 0.3);
                        e.target.value = '';
                    } else {
                        alert('Location not found. Try: Paris, Tokyo, New York, London, Sydney, Dubai, Bangkok, etc.');
                    }
                }
            });

            // Double click to focus
            canvas.addEventListener('dblclick', () => {
                flyToLocation(0, 0, 5);
            });

            // Animation loop
            engine.runRenderLoop(() => {
                updateDisplay();
                scene.render();
            });

            // Handle window resize
            window.addEventListener('resize', () => {
                engine.resize();
            });

            // Hide loading
            setTimeout(() => {
                loading.style.display = 'none';
            }, 1500);
        }

        main().catch(console.error);
    </script>
</body>
</html>
